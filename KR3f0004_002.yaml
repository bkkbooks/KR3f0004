body:
  text: 題革象新書後占天之學本聖賢大事業載典堯舜蓋有由也自慎竈之説行而儒者始術之矣其氛祲祥眚周官雖具至甘石星座其曰騎官羽林丞尉之類襲用秦漢名稱愈疑後學學者不屑用力焉殊不知經緯天地首務明時時茍不明終不能撫五星以播四政矣革象談異十無一二皆為厯設學者所當究心者也第以邵子之書不堪作厯致可疑焉皇極經世欠厯數用宋人雖有此談西山蔡氏以為書不盡言者藏諸用也又曰以當時日月五星推而上之得堯即位之日是即逆推法而不著其法者豈非藏諸用乎且數家以毫釐絲忽極於十百千萬如因影求形無具可隱況康節數學直繼孔子程子嘗言厯法主於日日正他皆可推洛下閎作厯言數百年後當差一日何承天因立差法攤其差於所厯之年以驗分數竟亦不審獨堯夫於日月交感之際以陰陽虧盈求之差法遂定可謂冠絶古今此非虛語也又按邵學伯溫不與而傳王豫豫殁書殉蜀道士杜可大購得於發冢之盜以授廖應淮由是邵學復出近世祝祕傅立齊琦皆得邵學者本朝宋學士先正最號博洽其序此書曰傅立極敬畏緣督謂其能發前人所未言不知立時曽見此説否也又論耶律西征庚午厯精妙絶出及元許王郭陳鄧諸公相與訂定授時厯可法萬代曽無一言及邵近舜江人余誠者為豫言邵學內外篇具見傳書而祕傳書又有內外集具天地人三元之學其天元所論厯數極為精簡意必具逆推法或伊川所謂冠絶古今者耳惜乎吾不得而時讀焉因併書之以為有志聖賢大事業者告蒙泉嶽正書
