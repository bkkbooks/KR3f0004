body:
  text: 重修革象新書天文算法類一推步之屬提要臣等謹案重修革象新書二卷明王禕刪定元趙氏本也禕有大事記續編已著録是書併趙氏原本五卷為二卷前有禕自序稱原書涉于蕪冗鄙陋反若昧其指意之所在因為之纂次削其支離證其訛舛釐其次第挈其要領云云今以原書相校其所潤色者頗多刋除者亦復不少然于改定之處不加論辨使觀者莫能尋其增損之迹以救其得失之由又其中舛謬之處亦未能芟除淨盡特其字句之蕪纍一經修飭斐然可觀抑亦善于點竄者矣平心而論原本詞雖稍沓而詳贍可考改本文雖頗略而簡徑易明各有所長未容偏廢故今仿新舊唐書之例並著于録焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀革象新書原序革象新書者趙緣督先生之所著也先生鄱陽人隱遁自晦不知其名若字或曰名敬字子恭或曰友欽其名弗能詳也故世因其自號稱之為緣督先生先生宋宗室之子習天官遁甲鈐式諸書欲以事功自奮一日坐芝山酒肆中逢丈夫修眉方瞳索酒酣飲先生異而即之相與談玄者頗久且曰汝來何遲也於是出囊中九還七返丹書遺之臨别先生問其姓名曰我扶風石得之也得之蓋世傳杏林仙人云先生自是視世事若漠然不經意間往東海上獨居十年注周易數萬言時人無有知者唯傅文懿公立極獨畏敬之以為發前人所未言先生復即棄去乘青騾從以小蒼頭往來衢婺山水間人不見其有所齎旅中之費未嘗有乏絶竟不知為何術倦遊而休泊然坐忘遂葬於衢之龍遊雞鳴山原有朱暉德明者龍遊人也久從先生遊得其星厯之學因獲受是書而暉亦以占天名家暉既沒其門人同里章濬深懼泯滅無傳亟正其舛訛刻於文梓而來徵濓為之序濓聞天官之説歷代所步必微有弗同蓋欲隨時考驗以合於天運而已自唐涉宋其法寖精至元為尤密耶律文正王楚材以金大明厯後天乃損節氣之分減周天之秒去交終之率治月轉之餘以至兩曜五行後先出沒皆有以研窮之而正其失且以西域與中國地里相去之逺立為里差以增損之名曰西征庚午元厯可謂無遺憾者矣已而許文正公衡王文肅公恂太史令郭公守敬復與南北日官陳鼎臣鄧元麟等遍參歷代厯法重測日月星辰消息運行之變酌取中數以為厯本即所定授時厯厯經厯議二書猶存可考證弗誣也君子謂當世所推步者皆二三大儒會其精神博其見聞備其儀像而後能造其精微今先生值天書有禁之時又獨處大江之南且無所謂觀天之器其所著書往往與諸公吻合而無間者雖絶倫之識有以致之誠以人心之理本同固皆相符而無南北之異也抑余聞西域逺在萬里之外元既取其國有扎瑪爾丹者獻萬年厯其測候之法但用十二宫而分為三百六十度至於二十八宿次舍之説皆若所不聞及推日月之薄蝕頗與中國合者亦以理之同故也嗚呼四海內外凡圎顱方趾之民其心皆同其理皆不殊也豈特占天之事為獨然哉先生之易已亡於兵燼所著兵家書暨神仙方技之言亦不存其所存者僅止此而已當與厯經並行無疑濓故特序先生之事於篇首使讀者知先生之學通乎天人庶幾相與謹其傳焉金華宋濓序革象新書原序革象司天之書也鄱陽趙緣督先生所纂先生名友某字子恭其先於宋有屬籍其學長於律法算數而天官星家之術尤精讀其書可見也其書有推步立成等篇皆載占驗之例而革象者則天地日月五星四時之故厯象之制俱在焉然其為言涉於蕪冗鄙陋反若昧其旨意之所在豫因為之纂次削其支離證其訛舛釐其次等挈其要領於是辭益簡而旨加明矣夫司天之學儒者之所宜務而世顧恆置之弗講何哉有志於斯者即是書求之精微之奧從可得而知也金華王禕序
