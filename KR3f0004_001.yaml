body:
  text: 元趙友欽撰明王禕刋訂天體左旋天體之運有常度而無停機天非有體也因星之所附麗擬之為天之體耳觀夫星之昏在東者及曉則西墜昏所不見者至曉則東升東西轉運有以驗天體之左旋矣然而北天之星未嘗入地終夜可見其旋轉為甚窄窺之以管其間一星旋轉尤密不出管中者曰紐星紐星所在天體不動是為北極若南天之星雖終夜不常見而其旋轉亦不逺知為南極之所在而南極亦不動南北二極為天體之管轄其猶門之樞車之軸歟試以圎瓜譬之北極乃瓜頂聨蒂之所南極乃瓜末含花之所天之東西為最廣則比瓜之腰圍北極髙而南極下故北極之旁雖旋轉而常在於天南極之側雖旋轉而不出於地此又可驗地在天內天如雞子地如內黃矣然天體極圎不類雞子乃取以為譬者非取其形之肖特以比天包地外而已以今譬之天體如鞠內盛半水而浮板水上板譬則地也置物板上鞠雖外轉板豈常動乎赤道周圍天體如圎瓜其分十二次猶瓜有十二瓣也周天三百六十五度餘四之一均為十二分則一瓣為三十度四十三分七十五秒其度輻輳於南北二極則度之形斂尖於瓜之兩端而開廣於瓜之腰圍瓜腰一圍名曰赤道其度在赤道者正得一度之廣去赤道則漸逺而漸狹雖名一度實不及一度也各度以二十八宿之距星紀數謂之經度若以天體比之彈丸則東西南北相距皆然東西分經則南北亦當分緯緯度皆以北極相去逺近為數亦三百六十五度餘四之一兩極相距一百八十二度六十二分五十秒赤道橫分兩極與兩極相逺各九十一度三十一分二十五秒天頂名嵩髙北極偏於嵩髙而北五十五度有奇赤道則斜倚於嵩髙之南三十六度蓋北極既偏於嵩髙之北南極既偏於地中之南所以赤道必斜倚於南也雖曰斜倚於南而其東西兩傍則固在卯酉之位矣黃道損益子正𤣥枵由於虛七度赤道均分周天宿度十二次以子中為的而分之黃道宿度與赤道宿度多寡不同而黃道各次宿度亦不等蓋由冬夏二至之日黃道平近於兩極其度斂狹每度約得十之九春秋二分斜行赤道之交赤道所在度既廣而又斜行每度為十有一惟四立之日度在酌中之處餘則以漸而廣狹矣今授時厯冬至日躔箕宿故寅申度數最少巳亥度數最多餘則多寡稍近也日道嵗差日行不由赤道晝永在赤道北晝短在赤道南其道别名黃道黃道赤道如兩環交差自冬至始言之日在赤道之南橫距赤道二十三度九十分冬至後行漸近北及仲春則離冬至所躔九十一度有竒而在赤道之交過交入赤道北斜去逺赤道九十一度有竒為夏至所躔而近北橫距亦二十三度九十分復從此漸轉而南但非由故道及仲秋復交於赤道而去夏至所躔亦九十一度有竒然非仲春之交乃其相對之處過交出赤道南其去赤道乃九十一度有竒為次年冬至復元度此周天嵗終之說也夫堯典日短星昴謂仲冬昏時昴宿見於午方也昴見正南則日躔虛宿可知蓋正東為卯正西為酉正南為午正北為子一日十二時晝夜歷十二位乃定方也天以各經宿分十二次乃動體也動者無常位名天盤定者有常位名地盤仲冬日在虛宿屬天盤子而酉時日在酉方則天盤之子加地盤之酉子加酉則酉必加午昴宿屬天盤酉故昏見於正南也又北斗有柄常指天盤卯辰間冬至日躔虛宿則昏見時天盤卯辰間加於地盤之子故世謂十一月斗柄為建子然天旋一晝夜而周酉末戌初則指丑而非子矣且冬至時日隨天盤寅以加地盤申酉界其天盤卯辰之間實加地盤之戌則斗柄又指戌而不指子也蓋天體一時轉一位戌末亥初乃指子但不可謂初昏指子耳夫日躔既有嵗差則昏旦亦必有差唐虞初昏乃今戌亥之時其後仲冬日差在卯則斗柄夜半指子差在午則平旦指子差在酉則日中方指子世謂閏月斗柄指兩辰之間者非也夫唐虞之時仲冬日在虛漢太初厯日冬至在牽牛之初而今授時厯至元冬至日在箕九度二十二分十八秒斗牛女虛危室壁北天七宿也三冬日躔之故曰日在北陸箕屬寅而冬至日躔之冬至後乃始躔斗則仲冬尚在東陸也以漢武較帝堯時已差一二十度而當時唐都洛下閎但疑八百年差一度何邪晉虞喜不用天周嵗終之術謂天度與嵗日數殊天自為天嵗自為嵗始以天體為三百六十五度二十六分乃四分之一有餘嵗策為三百六十五日二十四分乃四分之一不足一嵗差二分五十年差一度宋何承天以為嵗差太速改為百年差一度周天為三百六十五度二十五分半周嵗為三百六十五日二十四分半隋劉焯又折衷之以七十五年差一度唐一行又以八十三年差一度自後諸厯各各不同宋厯多在七十五度左十五秒周嵗三百六十五日二十四分二十五秒半右統天厯謂周天赤道三百六十五度二十五分七年差一度半又謂上古嵗策多後世嵗策少故上古嵗差少後世嵗差多也蓋三代以前未有嵗差之法晉宋而後雖立嵗差而未有定論李淳風猶謂無差冬至日常躔斗十三度至一行而論始定然其差數嵗嵗如一未有先加後減之法是故上考往古百年加一秒下驗將來百年減一秒其加減嵗策親切之數非嵗積久曷從知之授時厯以赤道分三百六十五度二十五分七十五秒而黃道止為三百六十五度二十五分六十四秒相懸十一秒者以黃道一周同於嵗策三百六十五日二十四分二十五秒比周天尚未足一分五十秒其一分五十秒不在瓜之腰圍橫距赤道二十四度斂而狹之止廣一分三十九秒以此一分三十九秒併入嵗周故云黃道三百六十五度二十五分六十四秒也黃道雖嵗差冬夏二至日躔必在橫距赤道二十四度然其差每嵗不同嵗差移一分餘斜絡於二十八宿之間嵗久皆其經行之道如捲紵絲為團絲絲纒絡雖重復參差而其周道則一而已且唐虞時日躔冬至在子夏至在午春分在卯秋分在酉今未四千年而冬至在寅夏至在申春秋二分在巳亥計其嵗差退四五十度則由帝堯後萬餘年冬至日反躔午夏至日反躔子春分在酉秋分在卯矣若復舊躔而冬至在子夏至在午當在二三萬年之間逆而推之帝堯之前亦必如是矣日月盈縮古法一晝夜月行十三度餘十九之一然觀其所躔先後不同有差至四五度者後漢劉洪始推究之知其疾行則十四度餘約四之三遲行則止十二度不餘其間漸疾漸遲大率二百四十八日盈縮九匝隋劉焯又推究日行亦有盈縮自冬至行一度五分漸減一二分至三四分以及赤道之交則正行一度從此復漸減之極於夏至止行九十五分自夏至後其行漸增所增與所減之數相似及冬至則復如前蓋一日行一度有餘曰疾不及一度曰遲以增虧之數相補一日止為一度從冬至距春分以行疾而積盈從春分距夏至以行遲而消其積盈比之常度猶差前故冬至距夏至皆曰盈段從夏至距秋分以行遲而積縮從秋分距冬至以行疾而消其積縮比之常度猶差後故夏至距冬至皆曰縮段然春分二日之前已交赤道則盈二度有餘秋分二日之後才交赤道則縮二度有餘故二分之際盈縮最多矣授時厯謂日在赤道之南行疾赤道之北行遲而後厯亦以春分距秋分行遲秋分距春分行疾要之月行遲疾盈縮之理亦然但度數不同耳授時厯謂每轉二十七日五十五分四十六秒月行三百六十八度三十七分四秒半乃盈縮之一匝其間遲疾之數相補遂以十三度三十六分八十七秒半為一日月平行之度李淳風有推步月孛法以六十二日行七度六十二年七周天孛者彗星之屬光芒偏掃者為彗光芒四出者為孛孛之所在月行最遲與孛對衝則月行最疾孛不常見則月行最遲處可以測之矣按孛者彗星之屬光芒偏掃者為彗光芒四出者為孛一段所引未當考月孛之孛與彗孛之孛不同月孛乃月歷天之最髙處其行較遲卑則其行較速至於彗孛之星隱見無時行無定度非可以常理測也審如其論則由月而可算孛星實屬誤㑹若夫日躔十二次蓋因各次黃道宿度不等又日有盈縮故或近或久不同且一嵗分二十四氣名曰常氣授時厯一氣為十五日二十一分八十四秒三十七毫半則是以常氣為定不復增減而舊厯則有增減之法月度縮而日度盈則定朔在常朔後名曰朒月度盈而日度縮則定朔在常朔前名曰朓若俱盈俱縮則對消而用有餘數定弦定望亦如之蓋古者未曽推步日月盈縮止以常期弦望為定今朔與弦望既有常定之名復有進退之法定朔在日沒以後若無日食見其初虧者則進以次日為朔恐月見於晦之晨也定弦望在日出以前則退一日定望在日出以後其望有食初虧在日出前者亦退一日定望在十七雖日出後亦退一日為其太遲也或望在十四上弦在初七下弦在二十二則不可退退則太早也或望在十三上弦在初六下弦在二十一非退而太早因進朔而然雖不皆早其朔不進或朔進而大月連四日為其過多朔亦不進也授時厯則不然當朔計二十九日五十三分五秒九十三毫當望半之當弦又半之實定而不進退矣但月食在夜半後雖屬次日亦只以當夜言望月有九行月行不由黃道亦不由赤道乃出入黃道之內外而有九行九行止是一道其道與黃道相交如赤道然然黃赤二道相逺處二十三度九十分而月道距黃道逺六度二分而已其相交處交之始強名曰羅㬋交之中強名曰計都自交始至交中月在黃道外名陽厯乃背羅向計之處也自交中至交始月在黃道內名隂厯乃背計向羅之處也月道猶水道日道猶陸道而羅計猶橋道其嵗嵗改異則由日行嵗差之故也案交行嵗嵗改易不獨因日行嵗差之故考交行有遲速而嵗差無退行交行嵗十九度强嵗差則嵗不及一分謂交行由嵗差亦誤㑹也且所謂九行者陽厯在夏至日躔之南夏為南乃南之南也名外朱道隂厯在冬至日躔之北北為內名內朱道在北而曰朱道者冬至屬子若冬至日躔伏於地盤子位則月在黃道之上凡地以下為北上為南故曰內朱道乃北之南也茍冬至日躔反在午位則內朱道亦在黃道之北矣此不論反而論伏黑道之理亦然隂厯在夏至日躔之北名內黑道夏為南乃南之北也陽厯在冬至日躔之南名內黑道在南而曰黑者月道在黃道之下凡地以上為南下為北故雖南而曰黑冬為北乃北之北也月行朱道則羅在日之春躔計在日之秋躔月行黑道則羅在日之秋躔計在日之春躔陽厯在秋分日躔之東名外青道乃東之東也陰厯在春分日躔之東名內青道乃西之東也陽厯在春分日躔之西名外白道乃西之西也隂厯在秋分日躔之西名內白道乃東之西也青白道不論反復若天地卯酉互位者亦然月行青道則羅在日之夏躔計在日之冬躔月行白道則羅在日之冬躔計在日之夏躔是故以內外分别朱黑青白為八道八道而曰九行者以八道之行交於黃道而穿度其間故通以九言也八道變易不常不可置於渾儀亦不可畫於星圗所可具者黃赤二道耳欲别於黃故塗以赤赤道與八道各相交逺近朱道止十八度逺黑道至三十度逺青白二道約二十四度逺授時厯謂月從黃道之交出外一百八十一度八十九分六十七秒則中交於黃道從此入黃道內復至交初則該三百六十三度七十九分三十六秒乃月道之一周計二十七日二十一分二十二秒二十四毫與古厯數不同焉月體半明月體本無圎缺如懸黑漆丸於簷下映日必有光轉射暗壁其半邊因映日故有光而半邊元暗也遇望與日躔度相對半邊之光全向於地普照人間半邊之暗全向於天人不可見也及漸相近而側相映則向地之邊光漸少矣至晦朔則與日同經日與天近月與日近其半邊之光全向於天半邊之暗則向於地及漸相逺而側相映則向地之邊光漸多矣故月體之光暗半輪轉旋人目所不及因謂其有圎缺耳然其與日對望為地所隔猶能受日之光者陰陽精氣之潛通如吸鐵之石感霜之鐘莫或間之也月明不全瑩而似瑕者如懸明鏡照水之處則瑩映地之處則瑕世以為山河所印之景是也按月之瑩瑕為山河所印之景其說相沿已久而於理未確考輿地全圗其在下者固不得見即東西與中間三面形勢亦迥不相同月東升西降在在照景而瑩瑕終始不異且光魄交際往往不齊似因凸凹之形而成明暗之質非山河印景亦未必如鏡之平也日月薄食日所行黃道未嘗附著於天其道印天一周乃在天之黃道在天黃道如大環日行黃道如小環小環居大環之內雖寬窄有少殊而皆為三百六十五度四分度之一且以日擬尺而量故為度則日行之黃道要為得數之真者夫日體大其道周圍亦大月體小其道周圍亦小月道在日道內亦猶小環在大環之中日去人逺月去人近月體因近視而比日體之大月道因近視而比日道之廣亦由日道之比乎天道矣若日食於朔月食於望則當以天度經緯推之日月之行常數以二十九日五十三分五秒九十三毫相㑹二次相㑹則同一經度雖其行度有盈縮定朔有先後所差不多較其同經不同緯止曰合朔或月從八道穿度黃道適與日遇則為同經同緯合朔而有食矣日體為月體所蔽故日食而日體非有損也日道與月道相交之處有二若正㑹於交則月體障盡日體而日暗甚謂之食既若交不正但在交之前後而度相近者亦食而不既近於正交則食分多逺於正交則食分少也兩朔之間日月對躔而望平分黃道之半黃道有二交若不當二交前後而望則月不食望在二交前後者必食食或既或不既其食分數則以距交逺近推之月體映日而明但涉經度相對其光已滿或於二交限內對經對緯所受日光傷於太勝陽極反亢故致月體黑暗如染紅濃厚反成紫也授時厯望在交之前後者距交十三度五分則不食若當交限內則有食矣望而距交未逺在四度三十五分之內其食必既餘八度七十分雖是食限而食不既也古者以日對衝之處名為暗虛謂日之象景也月體因之而失明故云暗日非有象景而强名之故云虛暗虛緣日而有故其圎徑與日等日體徑一度月體半之而其徑亦准一度則日道之廣亦必與徑同月道既准一度則暗虛廣二度也今以暗虛之黃道與月之本道兩道相交以交前四度三十五分併交後四度三十五分共八度七十分為食既限既限之前八度七十分為既外前限既限之後八度七十分為既外後限此三限在暗虛則為二十六度十分而在月道止為十三度五分也夫日食至十分即為食既月食乃至十五分者蓋十分已是食既既則已盡黑然所食雖既而才入既限故食十分以上之數為既內之分月望正在交的而食則名曰既內五分乃十五分也所以然者月之食限交前後各十三度五分歸限八度七十分而望則巳食十分矣更歸八十七分而後望則食十一分以十三度五分均為十五分每分計八十七分食十分計歸限八度七十分又既內五分計四度三十五分共十三度五分乃前限之一半其出後限亦然故月食有既限而日食則不立既限矣月食分數唯以距交逺近而論别無四時加減八方所見食分並同而日食則不然舊厯云假令中國食既戴日之下所虧才半化外反觀則交而不食化外食既戴日之下所虧才半中國反觀則交而不食何則日如大赤丸月如小黑丸共懸一索日上而月下即其下正望之黑丸必掩赤丸似食之既及傍觀有逺近之差則食數有多寡矣日行有四時之異月行有九道之殊日行極南月在陰厯則中國見食分多月在陽厯則中國見食分少開北户而向日之處月在陽厯反食多在隂厯反食少夏日近中國冬日近交廣唯戴日之下則在酌中之間凡食在午前見食早午後見食遲地偏西見食早偏東見食遲此其推步之差實因四時早晚及地偏南北東西而加減然南北東西不可以里路計南北則考表景及北極出地之數東西亦考表景及中星之所在以為加減之法今太史所驗徒以中國所見者言之而已且推步雖有法亦時或有失日月交㑹於夜望食於晝人不及見固所不論若帶食分出入在晨昏之際雖不見其食甚但見初虧或見復圎以前則必論之而所謂食甚之時則在初虧復圎之際其非食既者亦於此際食分最多從此則轉減少也日食止言既月食言既又言甚者蓋月初既之時名食既食既之後生光之前此際名為食甚若日則不然食既甚生光無所分别食既不久止須臾耳日月在望交者月道廣一度暗虛之道廣二度兩度相犯者多故食限亦多至十三度五分而其食之時刻亦不少在朔交者日月二道皆廣一度相犯者少故食限亦少約八度左右而其食之時刻亦不多日之食限少故其食也罕月之食限廣故其食也頻若夫起復方位則以月在陰陽厯論之月在陽厯者日食起於西南甚於正南復於東南月食起於東北甚於正北復於西北月在隂厯者日食起於西北甚於正北復於東北月食起於東南甚於正南復於西南凡日月食至八分以上者日食但云起於西復於東月食但云起於東復於西也日月之食其所行交道有常數雖盛世所不免故可以籌策推非若五星有反常之變也五緯距合日月懸虛運轉不附於天五星亦然月雖因日而有晦朔弦望其遲速不因日若五星則因日而有遲留伏逆矣近日則疾逺日則遲遲甚而留留久而退初遲退漸疾退退最疾而後遲退如初退止而留留久而順行却從最遲以至於最疾最疾則與日同躔也嵗星最疾約四日行一度熒惑最疾約七日行五度填星最疾約七日行一度此三星比日行度較少故伏合以後日在前嵗星距日十三度而晨見熒惑距日十九度而晨見填星距日十八度半而晨見晨見則在東方大約近一逺二而留周天相半而退嵗星初留約距日一百九度初退約距日一百三十一度熒惑初留約距日一百三十四度初退約距日一百四十四度填星初留約距日九十四度初退約距日一百二十八度凡退行最疾之時必與日對衝退止而留則背距日如初退之度留久而順行則背距日如初留之度日近於後躔漸近而行漸疾背近如晨見距日度則伏而光不著矣與日未對衝之先夜半後可望謂之晨段與日既對衝之後夜半前可望謂之夕段太白辰星則不然太白最疾約四日行五度有餘辰星最疾約一日行一度有餘此兩星皆比日行度較多伏合以後則過日而前太白距日十度半而夕見辰星距日十六度而夕見夕見則在西方太白距日甚逺不過四十五度辰星距日甚逺不過二十四度既已甚逺則所行遲比日較少由是漸與日近太白距日三十度有餘而初留辰星距日二十一度半而初留太白留後距日二十四度有餘而初退辰星留後距日十九度半而初退退行之際與日相近如夕見之度伏而不著與日相逺如夕見之度辰見於東退行最疾之時與日必同度退止而留則距日如初退之度留久而順行則距日如初留之度遲行漸疾而漸近日距日如退伏之度則又退而不著矣與日未退合之先昏後可望謂之夕段與日既退合之後曉前可望謂之晨段蓋金木形體大故伏見與日近水大土形體小故伏見與日逺嵗星八十三年而七周天與日合度者七十六合期約三百九十九日熒惑七十九年而四十二周天與日合度者三十七合期約七百八十日填星五十九年而二周天與日合度者五十七合期約三百七十八日太白辰星與日常相近隨日一年一周天太白八年而五合於日退合者又五約五百八十四日而順逆兩合辰星四十六年之間合於日者一百四十五退合亦然約一百一十六日而順逆兩合此乃五緯之常數也古法唯知有常度未知有變數之加減北齊張子信仰觀嵗久知五緯有盈縮之變當加減常數以求其逐日之躔蓋五緯不由黃道亦不由月之九道而出入黃道內外各自有其道視日逺近為遲疾如足力之有勤倦其變數之加減如里路之徑直斜曲也嵗星加減最多處約七度熒惑加減最多處二十五度有餘填星加減最多處八度有餘太白加減最多處四度有餘辰星加減最多處六度有餘此乃五緯盈縮之變數也若夫羅㬋計都月孛紫氣則其行均平無有遲疾羅㬋計都從月交黃道求之月交之終始該三百六十三度七十九分三十四秒歷二十七日二十一分二十二秒二十四毫羅計於其間各逆行一度四十六分三十秒其數併月行交終之度即黃道周天之度凡十八年有餘而周天交初復在舊躔矣月孛從月之盈縮而求盈縮一轉該二十七日五十五分四十六秒月行三百六十八度三十七分四秒半孛行三度十一分四十秒半黃道周天之度併孛行數即月行數也凡六十二年而七周天月行最遲之處與之同躔矣紫氣起於閏法約二十八年而周天授時厯以一十日八十七分五十三秒八十四毫為一嵗之閏紫氣則一嵗行十三度五分四秒六十毫八十芒兩數比之乃加二之算二十八年十閏紫氣行十二宫亦加二之算也舊云紫氣即景星罕聞其見史記注云景星狀如半月生於晦朔助月為明見則人君有德初盛之慶也五緯與月孛紫氣皆以左旋步之羅㬋計都逆行乃右旋步之設十一曜不附天而空轉則右轉者亦皆左旋其留者一日繞地一周與天同過一度行疾者反為遲行遲者反為疾退者反為疾之甚矣蓋順行而遲疾者皆一日繞地一周以不及天行之數為所行度退行者乃一日繞地一周多退天行之數退遲者先天不甚多退疾則愈多矣以物喻之日月猶魚也魚行江河不著其底必慿江河之水以行或逆或順各任其情日月雖懸虛不附於天意其必慿天之氣以行五緯之行亦猶是也夫在天成象日月星辰皆象也而日月五星獨異於衆星自有行度者此陰陽五行之精可以為造化之妙非衆星之比也日月五星體性不齊故遲疾有異亦當以隂陽五行别之日至之景天暑則日髙而近北天寒則日低而近南立表木以測其景日在中天表景最短東西出沒之時表景最長以四時驗之中晝之景漸長漸短逐日不同於是以中晝表景極短之日為夏至以中晝表景極長之日為冬至其所以短者由日近北而髙所以長者由日近南而低也日髙則行天必久而晝長晝長則陽氣積多而暑矣日低則行天不久而晝短晝短則陰氣積多而寒矣寒暑之變驗日景之長短可知也晝夜短長冬至日躔距赤道二十四度立冬與立春所距亦相近是時黃道橫而平近南極也立夏至立秋黃道橫平而近北極亦然蓋冬夏之日躔東西移差多南北移差少春秋則黃道斜移於南北雖東西行而南北差速於冬夏故春秋六七日間增減晝夜一刻而二至前後其晝夜短長增減一刻相去二十餘日矣是故冬夏增減之日遲春秋增減之日速日數未始均平也舊云日未出二刻半天先明日已入二刻半天方昏然此五刻不可以衆星出沒論但日始出為晝入則為夜也氣積寒暑夏至晝最長日最近北午中也冬至晝最短日最近南子中也然大暑乃在六月為未中大寒乃在十二月為丑中猶晝夜間未時熱甚於午丑時寒過於子也譬如甑之蒸也竈火甚炎可比午中而蒸氣猶未盛及其氣盛則竈火已稍衰矣竈火盡滅可比子中而蒸氣又良久然後衰也寒暑之氣豈非積久致之乎時分百刻晝夜十二時均分百刻一時有八大刻二小刻大刻總九十六小刻總二十四小刻六准大刻一故共為百刻也上半時之大刻四始曰初初次初一次初二次初三最後小刻為初四下半時之大刻亦四始曰正初次正一次正二次正三最後小刻為正四若子時則上半時在夜半前屬昨日下半時在夜半後屬今日亦猶冬至得十一月中氣一陽來復為天道之初耳古厯每時以二小刻為始乃各繼以四大刻然不若今厯之便於籌策也世謂子午卯酉各九刻餘皆八刻者非是
